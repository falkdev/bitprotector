name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_heavy_qemu:
        description: Also run heavy QEMU layers (application-workflows/failover/uninstall/resilience/upgrade/degraded-boot/drive-media-type) for manual runs
        type: boolean
        default: false
  workflow_call:
    inputs:
      run_heavy_qemu:
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Layer 0 — lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-rust

      - uses: ./.github/actions/setup-frontend

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: npm install (for lint)
        working-directory: frontend
        run: npm ci

      - name: npm lint
        working-directory: frontend
        run: npm run lint

      - name: prettier check
        working-directory: frontend
        run: npx prettier --check "src/**/*.{ts,tsx,css}"

  # ---------------------------------------------------------------------------
  # Layer 1 — unit tests
  # ---------------------------------------------------------------------------
  unit:
    name: Unit Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-rust

      - uses: ./.github/actions/setup-frontend

      - name: Rust unit tests
        run: cargo test --lib

      - name: npm install
        working-directory: frontend
        run: npm ci

      - name: Frontend unit tests (vitest)
        working-directory: frontend
        run: npm test

  # ---------------------------------------------------------------------------
  # Coverage (non-gating)
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage
    needs: unit
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-rust

      - uses: ./.github/actions/setup-frontend

      - name: Install cargo-llvm-cov
        run: |
          rustup component add llvm-tools-preview
          if ! cargo llvm-cov --version &>/dev/null; then
            cargo install cargo-llvm-cov --locked
          fi

      - name: Rust coverage
        run: cargo llvm-cov --lib --workspace --lcov --output-path rust.lcov --no-clean

      - name: Rust coverage summary
        run: cargo llvm-cov report --summary-only

      - name: Frontend coverage
        continue-on-error: true
        working-directory: frontend
        run: |
          npm ci
          npm run test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            rust.lcov
            frontend/coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Layer 2 — Rust integration tests (fast — all except scaling_100k)
  # ---------------------------------------------------------------------------
  rust-integration-fast:
    name: Rust Integration (fast)
    needs: [lint, unit]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-rust

      - name: cli_drives
        run: cargo test --test cli_drives
      - name: cli_files
        run: cargo test --test cli_files
      - name: cli_integrity
        run: cargo test --test cli_integrity
      - name: cli_virtual_paths
        run: cargo test --test cli_virtual_paths
      - name: cli_folders
        run: cargo test --test cli_folders
      - name: cli_sync
        run: cargo test --test cli_sync
      - name: cli_logs
        run: cargo test --test cli_logs
      - name: cli_database
        run: cargo test --test cli_database
      - name: cli_auth
        run: cargo test --test cli_auth
      - name: cli_status
        run: cargo test --test cli_status
      - name: packaging
        run: cargo test --test packaging
      - name: api_drives
        run: cargo test --test api_drives
      - name: api_files
        run: cargo test --test api_files
      - name: api_folders
        run: cargo test --test api_folders
      - name: api_virtual_paths
        run: cargo test --test api_virtual_paths
      - name: api_integrity
        run: cargo test --test api_integrity
      - name: api_scheduler
        run: cargo test --test api_scheduler
      - name: api_sync
        run: cargo test --test api_sync
      - name: api_logs
        run: cargo test --test api_logs
      - name: api_database
        run: cargo test --test api_database
      - name: api_routes
        run: cargo test --test api_routes
      - name: api_filesystem_browser
        run: cargo test --test api_filesystem_browser
      - name: core_mirror
        run: cargo test --test core_mirror
      - name: core_change_detection
        run: cargo test --test core_change_detection
      - name: core_scheduler
        run: cargo test --test core_scheduler
      - name: core_checksum_strategy
        run: cargo test --test core_checksum_strategy

  # ---------------------------------------------------------------------------
  # Layer 3 — Rust integration tests (heavy — scaling_100k with 3s budgets)
  # ---------------------------------------------------------------------------
  rust-integration-heavy:
    name: Rust Integration (heavy)
    needs: rust-integration-fast
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-rust

      - name: scaling_100k
        run: cargo test --test scaling_100k

  # ---------------------------------------------------------------------------
  # Layer 4 — build .deb artifacts (ubuntu-24.04 and ubuntu-26.04)
  # ---------------------------------------------------------------------------
  build-artifacts:
    name: Build Artifacts (ubuntu-${{ matrix.ubuntu }})
    needs: rust-integration-heavy
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - ubuntu: "24.04"
            deb_suffix: "24.04.1"
            runner: ubuntu-24.04
          - ubuntu: "26.04"
            deb_suffix: "26.04.1"
            # TODO: switch to ubuntu-26.04 once GA
            # Track: https://github.com/actions/runner-images/issues/13964
            runner: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # needed for git describe to find the last tag

      - uses: ./.github/actions/setup-rust

      - uses: ./.github/actions/setup-frontend

      - name: npm install
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install cargo-deb
        run: cargo binstall cargo-deb --no-confirm

      - name: Compute dev version
        run: |
          # Use last tag as base; fall back to Cargo.toml version if no tags exist.
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -n "${LAST_TAG}" ]]; then
            CARGO_BASE="${LAST_TAG#v}"
          else
            CARGO_BASE=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          fi
          # Convert '-' to '~' for Debian pre-release ordering, append Ubuntu revision + git SHA.
          DEB_UPSTREAM=$(echo "${CARGO_BASE}" | sed 's/-/~/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          DEV_VERSION="${DEB_UPSTREAM}-0ubuntu1~${{ matrix.deb_suffix }}+git.${SHORT_SHA}"
          echo "DEV_VERSION=${DEV_VERSION}" >> "$GITHUB_ENV"
          echo "Dev version: ${DEV_VERSION}"

      - name: Build .deb
        run: cargo deb --deb-version "${DEV_VERSION}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: bitprotector-deb-ubuntu-${{ matrix.ubuntu }}
          path: target/debian/bitprotector_*.deb
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Layer 5 — QEMU smoke (PR + main + nightly)
  # Matrix: ubuntu-24.04, ubuntu-26.04 (parallel, fail-fast)
  # ---------------------------------------------------------------------------
  qemu-smoke:
    name: QEMU Smoke (${{ matrix.guest }})
    needs: build-artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2222
            api_port: 18443
            deb_artifact: bitprotector-deb-ubuntu-24.04
          - guest: ubuntu-26.04
            ssh_port: 2223
            api_port: 18444
            deb_artifact: bitprotector-deb-ubuntu-26.04
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/

      - name: QEMU smoke test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
        run: ./tests/installation/qemu_test.sh

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Layer 6 — QEMU application workflows (PR + main + nightly + workflow_dispatch)
  # ---------------------------------------------------------------------------
  qemu-application-workflows:
    name: QEMU Application Workflows (${{ matrix.guest }})
    needs: qemu-smoke
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      inputs.run_heavy_qemu == true
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: true
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2302
            api_port: 19343
            deb_artifact: bitprotector-deb-ubuntu-24.04
          - guest: ubuntu-26.04
            ssh_port: 2303
            api_port: 19344
            deb_artifact: bitprotector-deb-ubuntu-26.04
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/

      - name: QEMU application workflows test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
        run: ./tests/installation/bundles/application_workflows.sh

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Layer 7 — QEMU resilience (PR + main + nightly + workflow_dispatch)
  # ---------------------------------------------------------------------------
  qemu-resilience:
    name: QEMU Resilience (${{ matrix.guest }})
    needs: qemu-smoke
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      inputs.run_heavy_qemu == true
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2232
            api_port: 18543
            deb_artifact: bitprotector-deb-ubuntu-24.04
          - guest: ubuntu-26.04
            ssh_port: 2233
            api_port: 18544
            deb_artifact: bitprotector-deb-ubuntu-26.04
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/

      - name: QEMU resilience test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
        run: ./tests/installation/bundles/resilience.sh

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Layer 8 — QEMU upgrade (PR + main + nightly + workflow_dispatch)
  # ---------------------------------------------------------------------------
  qemu-upgrade:
    name: QEMU Upgrade (${{ matrix.guest }})
    needs: qemu-smoke
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      inputs.run_heavy_qemu == true
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: true
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2242
            api_port: 18643
            deb_artifact: bitprotector-deb-ubuntu-24.04
            deb_suffix: "24.04.1"
          - guest: ubuntu-26.04
            ssh_port: 2243
            api_port: 18644
            deb_artifact: bitprotector-deb-ubuntu-26.04
            deb_suffix: "26.04.1"
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}

      - name: Download current .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/

      - name: Download alpha4 .deb from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Prerequisite: the v1.0.0-alpha4 GitHub Release must have a .deb asset
          # matching "*${{ matrix.deb_suffix }}*.deb" uploaded for each Ubuntu version.
          mkdir -p target/debian/alpha1
          gh release download v1.0.0-alpha4 \
            --pattern "*${{ matrix.deb_suffix }}*.deb" \
            --dir target/debian/alpha1
          echo "ALPHA1_DEB=$(ls -1 target/debian/alpha1/*.deb | head -1)" >> "$GITHUB_ENV"

      - name: QEMU upgrade test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
          ALPHA1_DEB: ${{ env.ALPHA1_DEB }}
        run: ./tests/installation/bundles/upgrade.sh

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Layer 9 — QEMU degraded-boot (PR + main + nightly + workflow_dispatch)
  # ---------------------------------------------------------------------------
  qemu-degraded-boot:
    name: QEMU Degraded Boot (${{ matrix.guest }})
    needs: qemu-smoke
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      inputs.run_heavy_qemu == true
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2252
            api_port: 18743
            deb_artifact: bitprotector-deb-ubuntu-24.04
          - guest: ubuntu-26.04
            ssh_port: 2253
            api_port: 18744
            deb_artifact: bitprotector-deb-ubuntu-26.04
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/

      - name: QEMU degraded-boot test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
        run: ./tests/installation/bundles/degraded_boot.sh

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Layer 10 — QEMU failover (PR + main + nightly + workflow_dispatch)
  # ---------------------------------------------------------------------------
  qemu-failover:
    name: QEMU Failover (${{ matrix.guest }})
    needs: qemu-smoke
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      inputs.run_heavy_qemu == true
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2262
            api_port: 18843
            deb_artifact: bitprotector-deb-ubuntu-24.04
          - guest: ubuntu-26.04
            ssh_port: 2263
            api_port: 18844
            deb_artifact: bitprotector-deb-ubuntu-26.04
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/

      - name: QEMU failover test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
        run: ./tests/installation/qemu_failover_test.sh

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Layer 11 — QEMU drive media type (PR + main + nightly + workflow_dispatch)
  # ---------------------------------------------------------------------------
  qemu-drive-media-type:
    name: QEMU Drive Media Type (${{ matrix.guest }})
    needs: qemu-smoke
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      inputs.run_heavy_qemu == true
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2264
            api_port: 18845
            deb_artifact: bitprotector-deb-ubuntu-24.04
          - guest: ubuntu-26.04
            ssh_port: 2265
            api_port: 18846
            deb_artifact: bitprotector-deb-ubuntu-26.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}
      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/
      - name: QEMU drive media type test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
        run: ./tests/installation/bundles/drive_media_type.sh
      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Layer 12 — QEMU uninstall (PR + main + nightly + workflow_dispatch)
  # ---------------------------------------------------------------------------
  qemu-uninstall:
    name: QEMU Uninstall (${{ matrix.guest }})
    needs: qemu-smoke
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      inputs.run_heavy_qemu == true
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2272
            api_port: 18943
            deb_artifact: bitprotector-deb-ubuntu-24.04
          - guest: ubuntu-26.04
            ssh_port: 2273
            api_port: 18944
            deb_artifact: bitprotector-deb-ubuntu-26.04
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/

      - name: QEMU uninstall test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
        run: ./tests/installation/qemu_uninstall_test.sh

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Layer 13 — Playwright E2E tests (ubuntu-24.04 only)
  # Boots a dedicated QEMU guest, installs the .deb, then runs the full
  # Playwright suite against it.  The same if: condition as layers 6-12 gates
  # this job on every PR/push/schedule and on manual runs with run_heavy_qemu.
  # ---------------------------------------------------------------------------
  e2e:
    name: Playwright E2E
    needs: qemu-smoke
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      inputs.run_heavy_qemu == true
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-qemu
        with:
          guest: ubuntu-24.04

      - uses: ./.github/actions/setup-frontend

      - name: npm install
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: bitprotector-deb-ubuntu-24.04
          path: target/debian/

      - name: Boot E2E QEMU guest
        env:
          GUEST_IMAGE: ubuntu-24.04
          SSH_PORT: '2280'
          API_PORT: '18480'
          CI: '1'
        run: ./tests/installation/e2e-guest.sh

      - name: Run Playwright E2E tests
        env:
          QEMU_SSH_PORT: '2280'
          QEMU_API_PORT: '18480'
          CI: 'true'
        working-directory: frontend
        run: npm run test:e2e:qemu

      - name: Stop E2E QEMU guest
        if: always()
        run: |
          PID_FILE="${RUNNER_TEMP}/e2e-qemu.pid"
          if [[ -f "${PID_FILE}" ]]; then
            kill "$(cat "${PID_FILE}")" 2>/dev/null || true
            echo "QEMU guest stopped"
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload QEMU logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-e2e
          path: |
