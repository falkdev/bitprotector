name: CodeQL

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    permissions:
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - uses: actions/checkout@v5

      # Rust requires system libraries for pam-client2 and aws-lc-sys (libclang).
      # These must be present before `cargo build` so that build scripts resolve.
      - name: Install system dependencies (Rust only)
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libpam0g-dev libclang-dev llvm

      - name: Install Rust toolchain (Rust only)
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          tools: latest

      # For Rust, CodeQL must observe the actual compilation (it hooks into
      # rustc to capture call targets and type information). The build step
      # must sit between init and analyze. build-mode: manual means CodeQL
      # does not run autobuild; we drive the build explicitly here.
      - name: Build (Rust manual build for CodeQL)
        if: matrix.build-mode == 'manual'
        run: cargo build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
