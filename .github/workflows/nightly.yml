name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Full CI (nightly)
    uses: ./.github/workflows/ci.yml
    with:
      run_heavy_qemu: true

  qemu-scale:
    name: QEMU Scale (nightly, ${{ matrix.guest }})
    needs: ci
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2282
            api_port: 19043
            deb_artifact: bitprotector-deb-ubuntu-24.04
          - guest: ubuntu-26.04
            ssh_port: 2283
            api_port: 19044
            deb_artifact: bitprotector-deb-ubuntu-26.04
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/

      - name: QEMU scale test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
        run: ./tests/installation/bundles/scale.sh

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn

  qemu-scale-lowmem:
    name: QEMU Scale Lowmem (nightly, ${{ matrix.guest }})
    needs: ci
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2292
            api_port: 19143
            deb_artifact: bitprotector-deb-ubuntu-24.04
          - guest: ubuntu-26.04
            ssh_port: 2293
            api_port: 19144
            deb_artifact: bitprotector-deb-ubuntu-26.04
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/

      - name: QEMU scale lowmem test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
        run: ./tests/installation/bundles/scale_lowmem.sh

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn

  qemu-scheduled-load:
    name: QEMU Scheduled Load (nightly, ${{ matrix.guest }})
    needs: ci
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2312
            api_port: 19443
            deb_artifact: bitprotector-deb-ubuntu-24.04
          - guest: ubuntu-26.04
            ssh_port: 2313
            api_port: 19444
            deb_artifact: bitprotector-deb-ubuntu-26.04
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/

      - name: QEMU scheduled load test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
        run: ./tests/installation/bundles/scheduled_load.sh

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn

  qemu-drive-media-type:
    name: QEMU Drive Media Type (nightly, ${{ matrix.guest }})
    needs: ci
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - guest: ubuntu-24.04
            ssh_port: 2294
            api_port: 19243
            deb_artifact: bitprotector-deb-ubuntu-24.04
          - guest: ubuntu-26.04
            ssh_port: 2295
            api_port: 19244
            deb_artifact: bitprotector-deb-ubuntu-26.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-qemu
        with:
          guest: ${{ matrix.guest }}
      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.deb_artifact }}
          path: target/debian/
      - name: QEMU drive media type test
        env:
          GUEST_IMAGE: ${{ matrix.guest }}
          SSH_PORT: ${{ matrix.ssh_port }}
          API_PORT: ${{ matrix.api_port }}
          CI: '1'
        run: ./tests/installation/bundles/drive_media_type.sh
      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ github.job }}-${{ matrix.guest }}
          path: |
            ${{ runner.temp }}/**/serial.log
            ${{ runner.temp }}/**/qemu.log
          retention-days: 7
          if-no-files-found: warn
