name: Setup QEMU
description: Install QEMU packages, verify KVM access, and download/cache the requested Ubuntu cloud image

inputs:
  guest:
    description: Guest OS label — ubuntu-24.04 or ubuntu-26.04
    required: true
    default: ubuntu-24.04

runs:
  using: composite
  steps:
    - name: Configure apt mirror
      shell: bash
      run: |
        # Probe a prioritised list of apt mirrors and use the first one that responds
        # on its expected port. The Azure mirror is tried first so it is used whenever
        # it is up; the others are fallbacks for when it is unreachable.
        # Only base host URLs — the /ubuntu path already present in sources.list is kept.
        MIRRORS=(
          "http://azure.archive.ubuntu.com"
          "https://archive.ubuntu.com"
          "https://mirrors.edge.kernel.org"
          "http://ftp.ubuntu.com"
        )

        pick_mirror() {
          for mirror in "${MIRRORS[@]}"; do
            host=$(echo "$mirror" | sed -E 's|https?://||;s|/.*||')
            port=443
            echo "$mirror" | grep -q "^http://" && port=80
            if timeout 5 bash -c "echo >/dev/tcp/${host}/${port}" 2>/dev/null; then
              echo "$mirror"
              return 0
            fi
            echo "::warning::apt mirror ${host} unreachable, trying next..." >&2
          done
          # All mirrors failed — return the first one and let apt-get surface the error.
          echo "${MIRRORS[0]}"
        }

        CHOSEN=$(pick_mirror)
        echo "Using apt mirror: ${CHOSEN}"
        # Collect all apt source files; use nullglob so the glob expands to nothing
        # when /etc/apt/sources.list.d/ has no .list files (avoids passing a literal
        # glob pattern to sed).
        shopt -s nullglob
        LIST_FILES=(/etc/apt/sources.list.d/*.list)
        shopt -u nullglob
        # Replace any existing Ubuntu archive mirror entries (azure or otherwise).
        # Use extended regex (-E) so https? correctly matches the optional 's'.
        # The patterns match only the base host so the /ubuntu path in each sources.list
        # entry is preserved as-is.
        sudo sed -i -E \
          -e "s|https?://azure\.archive\.ubuntu\.com|${CHOSEN}|g" \
          -e "s|https?://archive\.ubuntu\.com|${CHOSEN}|g" \
          /etc/apt/sources.list "${LIST_FILES[@]}" 2>/dev/null || true

    - name: Cache apt packages
      id: apt-cache
      uses: actions/cache@v5
      with:
        path: /var/cache/apt/archives
        key: apt-qemu-${{ runner.os }}-v1

    - name: Install QEMU and cloud-image utilities
      shell: bash
      run: |
        # Skip apt-get update on cache hits — the cached .deb files in
        # /var/cache/apt/archives are reused directly, so no mirror sync
        # is needed. On a miss apt-get update fetches fresh metadata and
        # downloads the packages; actions/cache@v5 then saves them above.
        if [[ "${{ steps.apt-cache.outputs.cache-hit }}" != "true" ]]; then
          sudo apt-get update -q
        fi
        sudo apt-get install -y -q \
          qemu-system-x86 qemu-utils cloud-image-utils socat openssh-client

    - name: Enable KVM access
      shell: bash
      run: |
        sudo chmod 666 /dev/kvm || true
        if command -v kvm-ok &>/dev/null; then
          kvm-ok || echo "WARNING: kvm-ok reports no hardware KVM — QEMU will fall back to TCG (slower)"
        fi

    - name: Resolve image metadata
      id: image-meta
      shell: bash
      run: |
        case "${{ inputs.guest }}" in
          ubuntu-24.04)
            echo "filename=noble-server-cloudimg-amd64.img" >> "$GITHUB_OUTPUT"
            echo "url=https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img" >> "$GITHUB_OUTPUT"
            ;;
          ubuntu-26.04)
            echo "filename=resolute-server-cloudimg-amd64.img" >> "$GITHUB_OUTPUT"
            echo "url=https://cloud-images.ubuntu.com/resolute/current/resolute-server-cloudimg-amd64.img" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "ERROR: unknown guest '${{ inputs.guest }}'" >&2
            exit 1
            ;;
        esac
        echo "cache-key=${{ inputs.guest }}-$(date -u '+%Y%m')" >> "$GITHUB_OUTPUT"

    - name: Cache cloud image
      id: image-cache
      uses: actions/cache@v5
      with:
        path: ~/images/${{ steps.image-meta.outputs.filename }}
        key: ${{ steps.image-meta.outputs.cache-key }}

    - name: Download cloud image (cache miss)
      if: steps.image-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p ~/images
        wget --show-progress \
          -O ~/images/${{ steps.image-meta.outputs.filename }}.tmp \
          ${{ steps.image-meta.outputs.url }}
        mv ~/images/${{ steps.image-meta.outputs.filename }}.tmp \
           ~/images/${{ steps.image-meta.outputs.filename }}

    - name: Generate throwaway SSH keypair
      shell: bash
      run: |
        mkdir -p "${RUNNER_TEMP}/.ssh"
        ssh-keygen -t ed25519 -N "" -f "${RUNNER_TEMP}/.ssh/id_ed25519" -C "ci-qemu"
        echo "BITPROTECTOR_QEMU_SSH_KEY=$(cat "${RUNNER_TEMP}/.ssh/id_ed25519.pub")" >> "$GITHUB_ENV"
        # Also place in ~/.ssh so the scripts' fallback path works
        mkdir -p ~/.ssh
        cp "${RUNNER_TEMP}/.ssh/id_ed25519.pub" ~/.ssh/id_ed25519.pub
        cp "${RUNNER_TEMP}/.ssh/id_ed25519" ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
