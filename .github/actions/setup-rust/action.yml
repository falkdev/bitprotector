name: Setup Rust
description: Install Rust toolchain and restore cargo caches

runs:
  using: composite
  steps:
    - name: Install system build dependencies
      shell: bash
      run: |
        sudo rm -f /etc/apt/sources.list.d/google-chrome.list /etc/apt/sources.list.d/google.list
        sudo apt-get update -q
        sudo apt-get install -y -q libpam0g-dev libclang-dev llvm

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo registry and build artifacts
      uses: Swatinem/rust-cache@v2.9.1
      with:
        cache-on-failure: true

    - name: Install cargo-binstall
      uses: cargo-bins/cargo-binstall@v1.19.1
