# cargo-release configuration
# Usage: cargo release <version>
# Example: cargo release 1.0.0-alpha1
#
# This will:
#   1. Bump version in Cargo.toml
#   2. Commit: "chore: release vX.Y.Z"
#   3. Tag: vX.Y.Z
#   4. Push commit + tag → triggers release.yml in GitHub Actions

# Don't publish to crates.io — we ship .deb via GitHub Releases
publish = false

# Commit message for the version bump
pre-release-commit-message = "chore: release v{{version}}"

# Tag as v{version} — matches release.yml trigger pattern 'v[0-9]*'
tag-name = "v{{version}}"
tag-message = "Release v{{version}}"

# Push the commit and tag immediately so GitHub Actions fires
push = true
