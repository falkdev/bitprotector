[server]
host = "0.0.0.0"
port = 8443
tls_cert = "/etc/bitprotector/cert.pem"
tls_key = "/etc/bitprotector/key.pem"

[database]
path = "/var/lib/bitprotector/bitprotector.db"

[virtual_paths]
symlink_base = "/var/lib/bitprotector/virtual/"

[logging]
level = "info"
file = "/var/log/bitprotector/bitprotector.log"

[scheduler]
enabled = true
