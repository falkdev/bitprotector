# BitProtector default configuration
# Location: /etc/bitprotector/config.toml
#
# Supported sections: [server] and [database].
# CLI flags override config file values, which override hardcoded defaults.
# Use --config <path> to specify a different config file path.

[server]
host           = "127.0.0.1"
port           = 8443
rate_limit_rps = 100
# IMPORTANT: Change this secret before deploying to production!
jwt_secret     = "change-me-in-production"
tls_cert       = "/etc/bitprotector/tls/cert.pem"
tls_key        = "/etc/bitprotector/tls/key.pem"

[database]
path = "/var/lib/bitprotector/bitprotector.db"
