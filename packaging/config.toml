# BitProtector default configuration
# Location: /etc/bitprotector/config.toml
#
# Supported sections: [server] and [database].
# CLI flags override config file values, which override hardcoded defaults.
# Use --config <path> to specify a different config file path.

[server]
host           = "127.0.0.1"
port           = 8443
rate_limit_rps = 100
# IMPORTANT: Change this secret before deploying to production!
jwt_secret     = "change-me-in-production"
tls_cert       = "/etc/bitprotector/tls/cert.pem"
tls_key        = "/etc/bitprotector/tls/key.pem"

[database]
path = "/var/lib/bitprotector/bitprotector.db"

[checksum]
# Maximum files checked in parallel for HDD-backed drive pairs.
# HDD seek time makes high parallelism counter-productive; keep this low.
# Default: 2 (allows master+mirror of one file to be read concurrently on separate drives)
hdd_max_parallel = 2

# Maximum files checked in parallel for SSD-backed drive pairs.
# 0 = auto (num_logical_cpus / 2, minimum 2).
ssd_max_parallel = 0
